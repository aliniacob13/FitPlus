version: "3.9"

services:
  db:
    image: postgis/postgis:16-3.4
    container_name: fitplus_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fitplus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fitplus_secret}
      POSTGRES_DB: ${POSTGRES_DB:-fitplus_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fitplus} -d ${POSTGRES_DB:-fitplus_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
