[tool.ruff]
target-version = "py312"
src = ["app", "tests"]
line-length = 100
exclude = [
    ".venv",
    "alembic/versions",
]

[tool.ruff.lint]
select = [
    "E", "F", "I", "UP", "B", "SIM",
]
ignore = [
    "B008",
]

[tool.ruff.lint.per-file-ignores]
"alembic/env.py" = ["E402"]

[tool.coverage.run]
branch = true
source = ["app"]
omit = ["*/tests/*", "*/alembic/*"]

[tool.coverage.report]
skip_empty = true
show_missing = true
