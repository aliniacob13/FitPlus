name: CD

on:
  push:
    branches: ["main"]
    tags: ["v*.*.*"]

# Only one deploy runs at a time; newer commits cancel older ones on the same branch.
concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/fitplus-backend

jobs:
  # ──────────────────────────────────────────────────────────
  # 1. Build & push the backend Docker image to GHCR
  # ──────────────────────────────────────────────────────────
  build-and-push:
    name: Build & push backend image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # needed to push to ghcr.io

    outputs:
      image: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.push.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Derives tags automatically:
      #   push to main  → ghcr.io/owner/fitplus-backend:main
      #   tag v1.2.3    → ghcr.io/owner/fitplus-backend:1.2.3
      #                   ghcr.io/owner/fitplus-backend:latest
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short

      - name: Build and push backend image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────────
  # 2. Run database migrations against the target environment
  # ──────────────────────────────────────────────────────────
  migrate:
    name: Run Alembic migrations
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production   # uses the "production" env secrets in GitHub

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install --no-cache-dir -r backend/requirements.txt
        working-directory: .

      - name: Run Alembic upgrade head
        working-directory: backend
        env:
          POSTGRES_USER:     ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB:       ${{ secrets.POSTGRES_DB }}
          POSTGRES_HOST:     ${{ secrets.POSTGRES_HOST }}
          POSTGRES_PORT:     ${{ secrets.POSTGRES_PORT }}
          SECRET_KEY:        ${{ secrets.SECRET_KEY }}
        run: alembic upgrade head

  # ──────────────────────────────────────────────────────────
  # 3. Deploy
  #    Replace the steps below with your actual hosting provider.
  #    Examples are shown for three common options — uncomment one.
  # ──────────────────────────────────────────────────────────
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: [build-and-push, migrate]
    environment:
      name: production
      url: ${{ vars.APP_URL }}

    steps:
      - uses: actions/checkout@v4

      # ── Option A: SSH into a VPS and pull the new image ──
      #
      # Required secrets: SSH_HOST, SSH_USER, SSH_PRIVATE_KEY
      #
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host:        ${{ secrets.SSH_HOST }}
          username:    ${{ secrets.SSH_USER }}
          key:         ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/fitplus
            echo "${{ secrets.GITHUB_TOKEN }}" \
              | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ${{ needs.build-and-push.outputs.image }}
            docker compose up -d --no-build backend
            docker image prune -f

      # ── Option B: Render — trigger a deploy hook ──────────
      #
      # Required secret: RENDER_DEPLOY_HOOK_URL
      #
      # - name: Trigger Render deploy
      #   run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

      # ── Option C: Railway CLI ─────────────────────────────
      #
      # Required secret: RAILWAY_TOKEN
      #
      # - name: Deploy to Railway
      #   uses: bervProject/railway-deploy@v1.3.0
      #   with:
      #     railway_token: ${{ secrets.RAILWAY_TOKEN }}
      #     service: fitplus-backend
