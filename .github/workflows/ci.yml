name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (ruff + pytest + alembic + coverage)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: fitplus
          POSTGRES_PASSWORD: fitplus_secret
          POSTGRES_DB: fitplus_db
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U fitplus -d fitplus_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      POSTGRES_USER: fitplus
      POSTGRES_PASSWORD: fitplus_secret
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5433
      POSTGRES_DB: fitplus_db
      SECRET_KEY: ci_secret_key_not_for_prod
      LLM_PROVIDER: openai
      LLM_MODEL: gpt-4o-mini
      OPENAI_API_KEY: ""
      ANTHROPIC_API_KEY: ""
      # Gym pricing import tests use HTTP-only path (no Chromium install in CI job).
      GYM_PRICING_PLAYWRIGHT_ENABLED: "false"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install system dependencies (Tesseract)
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr

      - name: Install Python dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check app tests

      - name: Ruff format (check only)
        run: ruff format --check app tests

      - name: Run Alembic migrations
        run: alembic upgrade head

      - name: Run pytest with coverage
        run: >
          pytest -v
          --cov=app
          --cov-report=term-missing
          --cov-report=xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-xml
          path: backend/coverage.xml
          if-no-files-found: warn

  mobile:
    name: Mobile (lint + test + TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Unit tests (Jest)
        run: npm test -- --ci

      - name: TypeScript typecheck
        run: npx tsc --noEmit

  docker-backend:
    name: Docker (backend image build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: fitplus-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
